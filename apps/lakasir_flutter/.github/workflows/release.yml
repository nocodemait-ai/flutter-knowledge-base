name: Release

on:
  push:
    tags:
      - '*.*.*' # matches 1.0.0, 2.1.3, etc.

env:
  APP_ENV: "production"
  APP_DEBUG: false
  BASE_URL: "https://lakasir.com"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync version from tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "Setting pubspec.yaml version to: $TAG"
          sed -i "s/^version: .*/version: $TAG/" pubspec.yaml
          cat pubspec.yaml | head -5

      - name: Set Android versionCode from tag
        run: |
          TAG="${{ github.ref_name }}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "flutter.versionCode=$VERSION_CODE" >> android/local.properties
          echo "flutter.versionName=$TAG" >> android/local.properties
          echo "versionCode=$VERSION_CODE versionName=$TAG"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Get packages
        run: flutter pub get

      - name: Setup .env
        run: cp .env.example .env

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ github.ref_name }}" || echo "Nothing to commit"
          git push origin HEAD:main
