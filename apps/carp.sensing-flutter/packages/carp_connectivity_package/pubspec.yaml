name: carp_connectivity_package
version: 2.0.0
description: CARP connectivity sampling package. Samples connectivity status, bluetooth devices, and wifi access points.
homepage: https://github.com/cph-cachet/carp.sensing-flutter
repository: https://github.com/cph-cachet/carp.sensing-flutter/tree/main/packages/carp_connectivity_package
issue_tracker: https://github.com/cph-cachet/carp.sensing-flutter/issues

documentation: https://docs.carp.dk/carp-mobile-sensing/
topics:
  - mobile-sensing
  - mobile-health
  - sensors
  - digital-phenotyping

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter

  carp_serializable: ^2.0.0
  carp_core: ^2.0.0
  carp_mobile_sensing: ^2.0.0
 
  json_annotation: ^4.8.0
  connectivity_plus: ^7.0.0    # connectivity events
  network_info_plus: ^7.0.0    # wifi ssid name
  flutter_blue_plus: '>=1.29.0 <3.0.0'  # bluetooth scan
  dchs_flutter_beacon: ^0.6.4  # collecting nearby iBeacon devices
  crypto: ^3.0.0               # hashing sensitive data
  permission_handler: '>=11.0.0 <13.0.0'


# Overriding carp libraries to use the local copy
# Remove this before release of package
dependency_overrides:
  # carp_serializable:
  #   path: ../../carp_serializable/
  # carp_core:
  #   path: ../../carp_core/
  # carp_mobile_sensing:
  #   path: ../../carp_mobile_sensing/

dev_dependencies:
  flutter_lints: any
  build_runner: any
  json_serializable: any
  test: any


