name: carp_survey_package_example
description: Examples of how to use the carp_survey_package.
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  carp_survey_package:
    path: ../

# Overriding carp libraries to use the local copy
# Remove this before release of package
dependency_overrides:
  # carp_serializable:
  #   path: ../../carp_serializable/
  carp_core:
    path: ../../../carp_core/
  carp_mobile_sensing:
    path: ../../../carp_mobile_sensing/