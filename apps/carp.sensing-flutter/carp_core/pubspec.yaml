name: carp_core
version: 2.1.2
description: The core domain model for the Copenhagen Research Platform (CARP) in Dart.

# Note that the following URLs to GitHub should use the old 'cph-cachet' name. 
# It seems like the pub.dev analyzer can't figure out that the name has changed.
homepage: https://github.com/cph-cachet/carp.sensing-flutter
repository: https://github.com/cph-cachet/carp.sensing-flutter/tree/main/carp_core
issue_tracker: https://github.com/cph-cachet/carp.sensing-flutter/issues

documentation: https://docs.carp.dk/carp-mobile-sensing/
topics:
  - mobile-sensing
  - mobile-health
  - sensors
  - digital-phenotyping

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  meta: ^1.9.0
  carp_serializable: ^2.0.0
  json_annotation: ^4.8.0
  iso_duration_parser: ^1.1.0

# Overriding carp core libraries to use the local copy
# Remove this before release of package
# dependency_overrides:
#   carp_serializable:
#     path: ../carp_serializable/

dev_dependencies:
  build_runner: any
  json_serializable: any
  test: any   
  flutter_lints: any


