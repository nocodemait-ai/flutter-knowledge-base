name: carp_webservices
version: 4.0.0
description: Flutter API for accessing the CARP web services, including authentication, deployments, data, files, and collections of documents.
homepage: https://github.com/cph-cachet/carp.sensing-flutter
repository: https://github.com/carp-dk/carp.sensing-flutter/tree/main/backends/carp_webservices
issue_tracker: https://github.com/cph-cachet/carp.sensing-flutter/issues

documentation: https://docs.carp.dk/carp-mobile-sensing/
topics:
  - mobile-sensing
  - mobile-health
  - sensors
  - digital-phenotyping

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter

  carp_serializable: ^2.0.0
  carp_core: ^2.0.0
  carp_mobile_sensing: ^2.0.0

  http: ^1.1.0
  json_annotation: ^4.8.0
  retry: ^3.1.0
  meta: ^1.7.0
  url_launcher: ^6.1.5
  jwt_decoder: ^2.0.1
  oidc: ^0.12.0
  oidc_default_store: ^0.4.0
  flutter_web_auth_2: ^4.1.0
  flutter_appauth: ^9.0.0
  
# Overriding carp libraries to use the local copy
# Remove this before release of package
dependency_overrides:
  # carp_serializable:
  #   path: ../../carp_serializable/
  # carp_core:
  #   path: ../../carp_core/
  # carp_mobile_sensing:
  #   path: ../../carp_mobile_sensing/

dev_dependencies:
  build_runner: any
  json_serializable: any
  test: any
  flutter_lints: any
  mockito: any
  flutter_test:
    sdk: flutter
  shared_preferences: ^2.2.3
  iso_duration_parser: ^1.1.1

flutter:
  uses-material-design: true
  assets:
    - asset/images/
